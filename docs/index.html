<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plugin Docs</title>
  <link rel="stylesheet" href="./css/shared/main.css" />
  <link rel="stylesheet" href="./css/partial/header.css" />
  <link rel="stylesheet" href="./css/partial/footer.css" />
</head>
<body>
  <div id="site-header"></div>

  <main>
    <section class="card">
      <h2>Documentation Entry</h2>
      <p>Open module guides for API contracts, shared common layer, and PaperMC platform runtime.</p>
      <div class="nav-row">
        <a class="button" href="./api/index.html">API Docs</a>
        <a class="button" href="./common/index.html">Common Docs</a>
        <a class="button alt" href="./platforms/papermc/index.html">PaperMC Docs</a>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script>
    const loadPartial = async (id, path) => {
      const host = document.getElementById(id);
      if (!host) return;
      const res = await fetch(path);
      host.innerHTML = await res.text();
    };

    loadPartial("site-header", "./partial/header.html");
    loadPartial("site-footer", "./partial/footer.html");
  </script>
</body>
</html>
